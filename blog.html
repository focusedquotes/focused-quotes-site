<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Blog - Focused Quotes</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: Montserrat;
        color: #f9f9f9;
        background-color: #1b1915;

        background-image: url(../assets/bgimg.webp);
        background-repeat: repeat; /* ✅ repeat image */
        background-position: top left; /* start from top */
        background-size: auto; /* ❌ remove stretch */
      }

      /* HEADER */
      .header {
        padding: 30px;
        text-align: center;
      }

      .header h1 {
        font-size: 40px;
        font-weight: 800;
      }

      .highlight {
        color: #dea15b;
      }

      /* CONTAINER */
      .container {
        max-width: 1100px;
        margin: auto;
        padding: 20px;
      }

      /* GRID */
      .blog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 30px;
      }

      /* CARD */
      .blog-card {
        background: rgba(53, 52, 48, 0.5);
        border: 1px solid rgba(222, 161, 91, 0.5);
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        transition: 0.3s;
      }

      .blog-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .blog-card img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 15px;
      }

      .blog-card h2 {
        color: white;
        font-size: 20px;
        margin-bottom: 10px;
      }

      .blog-card p {
        color: #ffffff;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Passive Income <span class="highlight">Blogs</span></h1>
    </div>

    <div class="container">
      <div class="blog-grid">
        <div class="blog-card">
          <a href="blog1.html">
            <img src="assets/after.png" />
            <h2>Top 5 Passive Income Ideas That Can Double Your Income</h2>
            <p>most practical and proven passive income ideas...</p>
          </a>
        </div>

        <div class="blog-card">
          <a href="blog2.html">
            <img src="assets/blog2_1.png" />
            <h2>5 Passive Income Ideas That Work</h2>
            <p>Real methods you can start today...</p>
          </a>
        </div>

        <div class="blog-card">
          <a href="blog3.html">
            <img src="https://via.placeholder.com/400x200" />
            <h2>Why You Stay Broke Even After Working Hard</h2>
            <p>The real reason behind financial struggle...</p>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
